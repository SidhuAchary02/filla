<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filla Autofill</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      max-height: 600px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      color: #333;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      text-align: center;
      font-weight: 600;
      font-size: 16px;
    }

    .container {
      padding: 16px;
      overflow-y: auto;
      max-height: 520px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-weight: 600;
      font-size: 13px;
      color: #667eea;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #555;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #666;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e0e0e0;
    }

    .btn-outline {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-outline:hover:not(:disabled) {
      background: #f0f2ff;
      transform: translateY(-2px);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 16px 0;
    }

    .hidden {
      display: none;
    }

    .user-info {
      background: #f0f2ff;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 12px;
    }

    .user-email {
      font-weight: 600;
      color: #667eea;
    }

    .loading {
      text-align: center;
      padding: 20px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">Filla Autofill</div>

  <div class="container">
    <!-- Auth Section -->
    <div id="authSection">
      <div class="section">
        <h2 class="section-title">Login</h2>
        <p class="info-text">Sign in with your Filla account to auto-fill forms.</p>
      </div>

      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>

      <div class="button-group" style="flex-direction: column;">
        <button class="btn-primary" id="loginBtn" style="width: 100%;">
          Sign In
        </button>
      </div>

      <div id="authStatus"></div>
    </div>

    <!-- Main Section -->
    <div id="mainSection" class="hidden">
      <div class="user-info">
        <span>Logged in as:</span> <br/>
        <span class="user-email" id="userEmail"></span>
        <button class="btn-secondary" id="logoutBtn" style="width: 100%; margin-top: 8px; padding: 8px;">
          Logout
        </button>
      </div>

      <div class="section">
        <p class="info-text">
          Autofill web forms with your profile information.
        </p>
      </div>

      <div class="button-group" style="flex-direction: column; gap: 12px;">
        <button class="btn-primary" id="autofillBtn" style="width: 100%;">
          Auto-fill Current Form
        </button>
        <button class="btn-outline" id="manageProfileBtn" style="width: 100%;">
          Manage Profile
        </button>
        <button class="btn-secondary" id="syncProfileBtn" style="width: 100%;">
          Sync Profile Data
        </button>
      </div>

      <div id="mainStatus"></div>
    </div>

    <!-- Loading Section -->
    <div id="loadingSection" class="loading hidden">
      <div class="spinner"></div>
      <p style="font-size: 12px; color: #666; margin-top: 12px;">Loading...</p>
    </div>
  </div>

  <script src="extension-auth.js"></script>
  <script src="field-matcher.js"></script>
  <script src="popup.js"></script>
</body>
</html>
