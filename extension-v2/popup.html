<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filla Autofill</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:          #f7f4ee;
      --surface:     #fffdf8;
      --surface-2:   #fff8ef;
      --border:      #d9cebc;
      --border-glow: rgba(218,90,42,0.28);
      --accent:      #da5a2a;
      --accent-2:    #9e2f09;
      --accent-glow: rgba(218,90,42,0.14);
      --text:        #1f1c17;
      --text-sub:    #635a4b;
      --text-mute:   #8a7a67;
      --success:     #2e9f74;
      --danger:      #b6401f;
      --radius:      12px;
      --radius-lg:   18px;
      --transition:  0.22s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Shell ─────────────────────────────────────────────────────── */
    .shell {
      width: 340px;
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient gradient orbs */
    .shell::before {
      content: "";
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,141,98,0.28) 0%, transparent 70%);
      pointer-events: none;
    }
    .shell::after {
      content: "";
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(255,201,62,0.26) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── View switching ────────────────────────────────────────────── */
    .view {
      position: absolute;
      inset: 0;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: opacity var(--transition), transform var(--transition);
    }
    .view.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }
    .view.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    /* ── Logo mark ─────────────────────────────────────────────────── */
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 4px;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-weight: 800;
      font-size: 13px;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .logo-text {
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    /* ── Login view specifics ──────────────────────────────────────── */
    .login-title {
      font-family: inherit;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.9px;
      color: var(--text);
      line-height: 1.2;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-sub);
      margin-top: 4px;
      line-height: 1.5;
    }

    /* ── Form elements ─────────────────────────────────────────────── */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-mute);
    }
    .field input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 13px;
      font-family: inherit;
      font-size: 13.5px;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .field input::placeholder { color: var(--text-mute); }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Buttons ───────────────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px 16px;
      border-radius: var(--radius);
      border: none;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition),
                  transform 0.1s ease, box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.98); }

    /* Primary */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.2px;
      box-shadow: 0 8px 20px rgba(158,47,9,0.25);
    }
    .btn-primary:hover {
      box-shadow: 0 10px 28px rgba(158,47,9,0.34);
      opacity: 0.93;
    }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Secondary */
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #fff2e6;
      border-color: #cdbfa9;
    }

    /* Ghost / Danger */
    .btn-ghost {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(182,64,31,0.28);
      font-size: 12.5px;
      padding: 8px 14px;
    }
    .btn-ghost:hover {
      background: rgba(182,64,31,0.09);
      border-color: rgba(182,64,31,0.45);
    }

    /* Disabled muted */
    .btn-muted {
      background: var(--surface-2);
      color: var(--text-mute);
      border: 1px solid var(--border);
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* ── Error / Toast messages ─────────────────────────────────────── */
    .msg {
      font-size: 12px;
      padding: 9px 12px;
      border-radius: 8px;
      display: none;
    }
    .msg.error {
      background: #fff1ec;
      border: 1px solid #efc2b3;
      color: #9e2f09;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.success {
      background: #edf8f2;
      border: 1px solid #b9e2cc;
      color: #2e9f74;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msg.hidden { display: none !important; }

    /* ── Dashboard header ───────────────────────────────────────────── */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 12px 5px 6px;
    }
    .avatar {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-weight: 700;
      font-size: 10px;
      color: #fff;
      flex-shrink: 0;
    }
    .user-email {
      font-size: 11.5px;
      color: var(--text-sub);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Dashboard CTA section ──────────────────────────────────────── */
    .dash-cta {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cta-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-mute);
      font-weight: 500;
    }

    /* ── Action grid ─────────────────────────────────────────────────── */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* ── Divider ─────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -24px;
    }

  </style>
</head>
<body>
  <div class="shell">

    <!-- ═══════════════════════════════════════════════════════════════
         VIEW 1 — LOGIN
    ═══════════════════════════════════════════════════════════════ -->
    <div id="view-login" class="view hidden">
      <div class="logo">
        <div class="logo-mark">F</div>
        <span class="logo-text">Filla</span>
      </div>

      <div>
        <h1 class="login-title">LOGIN</h1>
        <p class="login-sub">Sign in with your Filla account to auto-fill forms.</p>
      </div>

      <div class="field-group">
        <div class="field">
          <label for="input-email">Email</label>
          <input
            id="input-email"
            type="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <div class="field">
          <label for="input-password">Password</label>
          <input
            id="input-password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>
      </div>

      <div id="login-error" class="msg error hidden">
        <span>⚠</span>
        <span id="login-error-text">Invalid credentials.</span>
      </div>

      <button id="signin-btn" class="btn btn-primary">
        <span>Sign In</span>
      </button>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════
         VIEW 2 — DASHBOARD
    ═══════════════════════════════════════════════════════════════ -->
    <div id="view-dashboard" class="view hidden">
      <!-- Header row -->
      <div class="dash-header">
        <div class="logo">
          <div class="logo-mark">F</div>
          <span class="logo-text">Filla Autofill</span>
        </div>
        <button id="logout-btn" class="btn btn-ghost" style="width:auto; padding: 7px 13px; font-size:12px;">
          Logout
        </button>
      </div>

      <!-- User pill -->
      <div class="user-pill">
        <div class="avatar" id="user-avatar">S</div>
        <span class="user-email" id="user-email-display">—</span>
      </div>

      <!-- CTA card -->
      <div class="dash-cta">
        <button id="autofill-btn" class="btn btn-primary">
          <span>⚡ Auto-fill Current Form</span>
        </button>
      </div>

      <!-- Action grid -->
      <div class="action-grid">
        <button id="manage-profile-btn" class="btn btn-secondary" style="font-size:12.5px; padding:10px 10px;">
          👤 Manage Profile
        </button>
        <button class="btn btn-muted" disabled style="font-size:12.5px; padding:10px 10px;">
          ☁ Sync Profile
        </button>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
